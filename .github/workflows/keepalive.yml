name: keep-render-awake

# Pings the Render free web service so it does not spin down after 15 min idle.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the keeper
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 https://the-pit-keeper.onrender.com/ || echo "000")
          echo "ping status: $code"
